version: "3.8"
services:
  ai:
    build: 
      context: ../ai
      dockerfile: Dockerfile
    container_name: ai
    env_file:
      - ./.env
    volumes:
      - type: bind
        source: ../ai
        target: /ai
      - type: bind
        source: ${HOST_ROOT_DIR}
        target: ${ROOT_DIR}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - localnet

networks:
  localnet:
    driver: bridge
