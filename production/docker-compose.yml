version: "3.8"
services:
  database:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - ./.env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - localnet

  frontend:
    container_name: frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - 80:80
    networks:
      - localnet

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - ./.env
    volumes:
      - type: bind
        source: ../backend
        target: /backend
      - type: bind
        source: ${VIDEOS_PATH}
        target: ${VIDEOS_VOLUME_DIR}
      - type: bind
        source: ${FRAMES_PATH}
        target: ${FRAMES_VOLUME_DIR}
      - type: bind
        source: ${KEYFRAME_FOLDER}
        target: ${KEYFRAME_VOLUME_DIR}
      - type: bind
        source: ${EMBEDDING_FOLDER}
        target: ${EMBEDDING_VOLUME_DIR}
      
    environment:
      DB_HOST: database
    ports:
      - "8000:8000"
    restart: "always" # Update restart policy if needed
    depends_on:
      - database
    networks:
      - localnet

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - localnet

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2020-12-03T00-03-10Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - localnet

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.0.2
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    networks:
      - localnet

networks:
  localnet:
    driver: bridge

volumes:
  mysql_data:
