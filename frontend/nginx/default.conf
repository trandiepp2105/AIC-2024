server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Cấu hình phục vụ ứng dụng React
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình proxy cho các yêu cầu đến backend FastAPI
    # location /api/ {
    #     proxy_pass http://YOUR_SERVER_IP:8000;  # Thay YOUR_SERVER_IP bằng IP của server 

    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-NginX-Proxy true;

    #     Optional: Set proxy timeouts
    #     proxy_read_timeout 90s;
    #     proxy_connect_timeout 90s;
    #     proxy_send_timeout 90s;
    # }

    # Cấu hình trang lỗi cho các lỗi server
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
